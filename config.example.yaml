# hawk-bridge Configuration Example
# Copy this to ~/.hawk/config.yaml and edit as needed.

# Database provider: lancedb | qdrant | chroma
db:
  provider: lancedb

# Embedding provider: jina | openai | qianwen | ollama | cohere
embedding:
  provider: jina
  apiKey: ${JINA_API_KEY}  # Supports env var placeholder — filled from JINA_API_KEY env var
  model: jina-embeddings-v5-small
  baseURL: ""
  dimensions: 1024

# LLM provider for memory operations
llm:
  provider: groq
  apiKey: ""
  model: llama-3.3-70b-versatile
  baseURL: ""

# Memory capture settings
capture:
  enabled: true
  maxChunks: 3
  importanceThreshold: 0.5
  ttlMs: 2592000000  # 30 days in milliseconds
  maxChunkSize: 2000
  minChunkSize: 20
  dedupSimilarity: 0.95

# Memory recall settings
recall:
  topK: 5
  minScore: 0.6
  injectEmoji: "🦅"

# Audit settings
audit:
  enabled: true

# Python settings
python:
  pythonPath: python3.12
  hawkDir: ~/.openclaw/hawk
